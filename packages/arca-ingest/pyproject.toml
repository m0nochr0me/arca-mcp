[project]
name = "arca-ingest"
version = "0.2.0"
description = "Optional document loading and chunking add-on for Arca MCP."
requires-python = ">=3.14"
dependencies = [
    "semchunk>=4.0.0",
]

[project.optional-dependencies]
# Format loaders are kept optional even within the add-on; each registers itself in
# arca_ingest.loaders only when its parser is importable.
pdf = ["pypdf>=5.0.0"]
docx = ["mammoth>=1.11.0", "beautifulsoup4>=4.12.0", "markdownify>=1.2.0"]
html = ["beautifulsoup4>=4.12.0", "markdownify>=1.2.0"]
epub = ["ebooklib>=0.18", "beautifulsoup4>=4.12.0", "markdownify>=1.2.0"]
fb2 = ["defusedxml>=0.7.1"]
all = ["arca-ingest[pdf,docx,html,epub,fb2]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arca_ingest"]
